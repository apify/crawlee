packages:
    - packages/*
    - docs
    - website

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
    - "@apify/*"
    - "@crawlee/*"
    - "apify-client"
    - "apify"
    - "crawlee"
    - "got-scraping"

overrides:
    playwright-core: 1.61.1
    "@browserbasehq/stagehand": 3.0.7
    # Dedup minimatch to v9 everywhere except inside lerna — lerna 9.x's bundled
    # code (`__toESM(require('minimatch')).default(...)`) only works with v3,
    # whose CJS export *is* the function. Pinning v9 there caused the publish
    # step to silently report 0 changed packages.
    minimatch: "^9.0.0"
    tmp: "^0.2.7"
    "@puppeteer/browsers": "^3.0.4"
    form-data: "^4.0.6"
    tar: "^7.5.16"
    "lerna>js-yaml": "^4.2.0"
    "lerna>minimatch": "^3.1.4"

onlyBuiltDependencies:
    - "@apify/ui-icons"
    - "@playwright/browser-chromium"
    - "@playwright/browser-firefox"
    - "@playwright/browser-webkit"
    - "@swc/core"
    - better-sqlite3
    - bufferutil
    - core-js
    - esbuild
    - nx
    - protobufjs
    - puppeteer
    - unrs-resolver

nodeLinker: hoisted
linkWorkspacePackages: true
preferWorkspacePackages: true
publicHoistPattern:
    - "*"

patchedDependencies:
    "@docusaurus/core@3.9.2": patches/@docusaurus__core@3.9.2.patch
    "@signalwire/docusaurus-plugin-llms-txt@1.2.2": patches/@signalwire+docusaurus-plugin-llms-txt+1.2.2.patch
