packages:
    - packages/*
    - docs
    - website

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
    - "@apify/*"
    - "@crawlee/*"
    - "apify-client"
    - "apify"
    - "crawlee"
    - "got-scraping"

overrides:
    playwright-core: 1.58.2
    "@browserbasehq/stagehand": 3.0.7
    minimatch: "^9.0.0"
    "@apify/eslint-config": "2.0.0"

onlyBuiltDependencies:
    - "@apify/ui-icons"
    - "@playwright/browser-chromium"
    - "@playwright/browser-firefox"
    - "@playwright/browser-webkit"
    - "@swc/core"
    - better-sqlite3
    - bufferutil
    - core-js
    - esbuild
    - nx
    - protobufjs
    - puppeteer
    - unrs-resolver

nodeLinker: hoisted
linkWorkspacePackages: true
preferWorkspacePackages: true
publicHoistPattern:
    - "*"
